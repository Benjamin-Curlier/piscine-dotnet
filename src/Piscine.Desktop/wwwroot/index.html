<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <!-- Defense-en-profondeur (CSP) : verrouille les origines de chargement. Doit autoriser ce que la
         page utilise réellement — le bootstrap inline (thème + highlightAll) et le BlazorWebView via
         'unsafe-inline', et cdnjs pour highlight.js (script + thème CSS). Blazor Hybrid (WebView natif,
         pas WASM) n'a besoin ni de 'unsafe-eval' ni de 'wasm-unsafe-eval'. frame-ancestors est volontairement
         omis : il est ignoré dans une CSP <meta> (déclencherait un avertissement console). -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'" />
    <base href="/" />
    <!-- Anti-flash : applique le thème (clair/sombre/système) + l'échelle de police avant le premier
         paint. Même logique que theme.js (qui redéfinit ensuite __applyTheme avec les helpers complets). -->
    <script>window.__applyTheme=function(){var p=localStorage.getItem('theme')||'system';var t=(p==='light'||p==='dark')?p:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);var s=parseFloat(localStorage.getItem('fontScale'));if(isNaN(s)){s=1;}s=Math.min(1.5,Math.max(0.8,s));document.documentElement.style.setProperty('--font-scale',s);};window.__applyTheme();</script>
    <!-- CSS thème partagé (variables CSS + [data-theme], layout) depuis la RCL -->
    <link rel="stylesheet" href="_content/Piscine.Components/css/piscine.css" />
    <!-- Coloration syntaxique highlight.js (thème sombre github-dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" />
</head>
<body>
    <div id="app">Chargement…</div>
    <script src="_framework/blazor.webview.js"></script>
    <!-- JS thème partagé (toggleTheme, updateThemeIcon, __applyTheme) depuis la RCL -->
    <script src="_content/Piscine.Components/js/theme.js"></script>
    <!-- highlight.js : coloration des blocs de code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script>
        function highlightAll() {
            if (!window.hljs) return;
            document.querySelectorAll('pre code:not([data-highlighted])').forEach(function (el) {
                window.hljs.highlightElement(el);
            });
        }
        window.addEventListener('load', function () {
            window.__applyTheme && window.__applyTheme();
            window.updateThemeIcon && window.updateThemeIcon();
            highlightAll();
        });
    </script>
    <!-- Sonde de rendu (mode smoke). Envoie un bilan du DOM réellement rendu à l'hôte par web message.
         L'hôte ne l'exploite qu'en PISCINE_SMOKE (voir SmokeProbe.cs) ; sans handler côté hôte c'est inerte. -->
    <script>
        (function () {
            if (!window.external || !window.external.sendMessage) return;
            function summary() {
                var app = document.getElementById('app');
                var h1 = document.querySelector('h1');
                return {
                    received: true,
                    url: location.href,
                    appTextLen: app ? app.innerText.trim().length : -1,
                    bodyHtmlLen: document.body ? document.body.innerHTML.length : -1,
                    h1: h1 ? h1.innerText.trim() : null,
                    dashboard: !!document.querySelector('[data-testid="dashboard"]'),
                    navTabs: document.querySelectorAll('[data-testid^="nav-"]').length,
                    statusDots: document.querySelectorAll('[data-testid="status-dot"]').length
                };
            }
            var sent = 0, t = setInterval(function () {
                try { window.external.sendMessage('PISCINE_SMOKE:' + JSON.stringify(summary())); } catch (e) { }
                if (++sent >= 8) clearInterval(t);
            }, 1200);
        })();
    </script>
</body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Piscine.slnx

      - name: Build
        run: dotnet build Piscine.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Piscine.slnx --configuration Release --no-build --verbosity normal

      - name: Validate content
        run: dotnet run --project src/Piscine.Cli --configuration Release --no-restore -- validate-content
        env:
          PISCINE_CONTENT: ${{ github.workspace }}/content

      # Dry-run du packaging desktop (S9) : exerce, a chaque PR, la meme operation que la
      # release (publish self-contained par RID) AVANT tout tag. Les libs natives PhotinoX
      # sont posees a la RACINE de sortie (pas runtimes/<rid>/native/) — verifie en T1.
      - name: Dry-run packaging desktop (publish cross-RID + libs natives)
        run: |
          set -euo pipefail
          for rid in linux-x64 win-x64; do
            out="artifacts/desktop-dryrun/$rid"
            dotnet publish src/Piscine.Desktop --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out"
            test -f "$out/Piscine.Desktop" -o -f "$out/Piscine.Desktop.exe"
            case "$rid" in
              win-x64)   test -f "$out/PhotinoX.Native.dll" && test -f "$out/WebView2Loader.dll" ;;
              linux-x64) test -f "$out/PhotinoX.Native.so" ;;
            esac
            echo "OK $rid"
          done

  # Dry-run AppImage Linux (online) : garde de packaging a chaque PR — construit l'AppImage online et
  # verifie qu'elle est bien produite (regression d'empaquetage attrapee avant tout tag).
  # L'AppImage OFFLINE (webkit bundle) est ABANDONNEE en v3.1.0 : WebKitGTK en build release ignore
  # WEBKIT_EXEC_PATH (honore seulement en DEVELOPER_MODE) et cherche ses process auxiliaires a un chemin
  # absolu compile (PKGLIBEXECDIR) -> impossible d'embarquer un webkit fonctionnel sans bind-mount
  # privilegie. L'online s'appuie sur le webkit systeme (libwebkit2gtk-4.1). Cf. adr/2026-06-08-photinox-fork.md.
  appimage-online-dryrun:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Construire l'AppImage online (garde de packaging)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick libfuse2 patchelf desktop-file-utils \
            librsvg2-2 librsvg2-common libglib2.0-bin libgdk-pixbuf2.0-bin
          dotnet run --project src/Piscine.Cli -c Release -- package-content content artifacts/content
          appdir="artifacts/appimage-online/AppDir"
          mkdir -p "$appdir/usr/bin/gitshim" "$appdir/usr/share/piscine"
          dotnet publish src/Piscine.Desktop -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin"
          dotnet publish src/Piscine.GitShim  -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin/gitshim"
          cp -r artifacts/content "$appdir/usr/share/piscine/content"
          mkdir -p dist
          bash build/installer/linux/build-appimage.sh online "$appdir" dist/piscine-online.AppImage
          test -s dist/piscine-online.AppImage
          ls -lh dist/piscine-online.AppImage
          echo "ONLINE OK : AppImage online construite (s'appuie sur le webkit systeme au lancement)"

  # Dry-run installeur Windows (S13) : garde de compilation a chaque PR — Inno Setup + ISCC sur un
  # payload stub, les 2 modes (offline/online), assert que les 2 .exe sont produits. (Le vrai payload
  # + téléchargements WebView2 sont exercés par release.yml au tag.)
  windows-installer-dryrun:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Installer Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Compiler les installeurs (payload stub)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $p = "payload"
          New-Item -ItemType Directory -Force "$p/desktop/gitshim", "$p/content/modules", "$p/mingit" | Out-Null
          foreach ($f in @("piscine.exe","desktop/Piscine.Desktop.exe","desktop/gitshim/git.exe","webview2-setup.exe","content/modules/.keep")) {
            "stub" | Set-Content "$p/$f"
          }
          Copy-Item build/launchers/start-piscine.cmd, build/launchers/start-piscine-desktop.cmd $p
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $payloadAbs = (Resolve-Path $p).Path
          & $iscc "/DMODE=offline" "/DAPPVERSION=v0.0.0-dryrun" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          & $iscc "/DMODE=online"  "/DAPPVERSION=v0.0.0-dryrun" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          $exes = Get-ChildItem build\installer\windows\dist\*.exe
          $exes | Select-Object Name, Length
          if ($exes.Count -lt 2) { Write-Error "Attendu 2 installeurs (.exe), trouve $($exes.Count)" }
          Write-Host "OK : 2 installeurs Inno compiles (offline + online)"

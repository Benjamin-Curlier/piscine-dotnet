name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Piscine.slnx

      - name: Build
        run: dotnet build Piscine.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Piscine.slnx --configuration Release --no-build --verbosity normal

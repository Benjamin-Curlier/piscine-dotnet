name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Moindre privilege : le GITHUB_TOKEN de cette CI n'a besoin que de lire le dépôt (build/test/validate).
permissions:
  contents: read

# CI-2 : annule les runs redondants sur une meme ref (un nouveau push remplace l'ancien run en cours).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI-1 : detecte si la PR/le push touche au "packaging" (src, build, csproj, workflows…). Les dry-runs
  # lourds (publish cross-RID, AppImage, installeur Windows) ne tournent QUE si c'est le cas — un commit
  # purement docs/contenu n'a pas a relancer (ni a faire rougir) tout le packaging. build-test + validate
  # -content restent inconditionnels.
  changes:
    runs-on: ubuntu-latest
    outputs:
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packaging:
              - 'src/**'
              - 'build/**'
              - '**/*.csproj'
              - 'Directory.Build.props'
              - 'Piscine.slnx'
              - '.github/workflows/**'

  build-test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # CI-3 : cache des paquets NuGet (cle = empreinte des csproj + props centralisees ; pas de
      # packages.lock.json requis). restore-keys = repli partiel si la cle exacte manque.
      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Piscine.slnx

      - name: Build
        run: dotnet build Piscine.slnx --configuration Release --no-restore

      # COV-3 : collecte la couverture (coverlet, deja reference par les projets de test) pour la
      # rendre VISIBLE. Pas de seuil bloquant (coherent avec l'ethos "jamais de note" + les projets
      # hote/CLI hors instrumentation) : visibilite, pas barriere.
      - name: Test (avec couverture)
        run: >-
          dotnet test Piscine.slnx --configuration Release --no-build --verbosity normal
          --collect:"XPlat Code Coverage" --results-directory artifacts/coverage

      - name: Résumé de couverture (job summary, sans seuil)
        if: always()
        run: |
          set -euo pipefail
          dotnet tool install dotnet-reportgenerator-globaltool --tool-path .tools
          .tools/reportgenerator -reports:"artifacts/coverage/**/coverage.cobertura.xml" \
            -targetdir:artifacts/coverage/report -reporttypes:MarkdownSummaryGithub
          cat artifacts/coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Validate content
        run: dotnet run --project src/Piscine.Cli --configuration Release --no-restore -- validate-content
        env:
          PISCINE_CONTENT: ${{ github.workspace }}/content

      # Dry-run du packaging desktop (S9) : exerce, a chaque PR *touchant le packaging*, la meme
      # operation que la release (publish self-contained par RID) AVANT tout tag. Les libs natives
      # PhotinoX sont posees a la RACINE de sortie (pas runtimes/<rid>/native/). Inclut le bac a sable
      # d'execution recrue (self-contained, modele gitshim) : garde le publish du sandbox VERT.
      - name: Dry-run packaging desktop (publish cross-RID + libs natives + sandbox)
        if: ${{ needs.changes.outputs.packaging == 'true' }}
        run: |
          set -euo pipefail
          for rid in linux-x64 win-x64; do
            out="artifacts/desktop-dryrun/$rid"
            dotnet publish src/Piscine.Desktop --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out"
            test -f "$out/Piscine.Desktop" -o -f "$out/Piscine.Desktop.exe"
            case "$rid" in
              win-x64)   test -f "$out/PhotinoX.Native.dll" && test -f "$out/WebView2Loader.dll" ;;
              linux-x64) test -f "$out/PhotinoX.Native.so" ;;
            esac
            dotnet publish src/Piscine.Sandbox --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out/sandbox"
            case "$rid" in
              win-x64)   test -f "$out/sandbox/Piscine.Sandbox.exe" ;;
              linux-x64) test -f "$out/sandbox/Piscine.Sandbox" ;;
            esac
            echo "OK $rid"
          done

  # CI-4 : E2E DevHost (Playwright/Chromium). Les smokes de tests/Piscine.DevHost.E2E pilotent un VRAI
  # navigateur contre le DevHost (onboarding, /init, /check, /reglages, terminal, palette…). Ils tournent
  # deja dans build-test mais s'y SAUTENT proprement, faute de navigateur (aucune couverture UI reelle).
  # Ce job installe Chromium via Playwright pour qu'ils s'executent pour de bon.
  # Marque INFORMATIF (continue-on-error) : verifie vert en local (Chromium installe), mais jamais encore
  # exerce sur runner Linux (PTY, timing, chromium headless) — a promouvoir en check REQUIS une fois vert
  # de facon repetee sur CI, pour ne pas rougir la CI sur une difference de plateforme non reproduite.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Piscine.slnx

      # Build (Debug, comme en local) : produit aussi le script playwright.ps1 dans la sortie du projet
      # E2E, et le DevHost que les tests lancent via `dotnet run` (Debug par defaut) au moment du test.
      - name: Build
        run: dotnet build Piscine.slnx --no-restore

      # Installe le Chromium bundle de Playwright (+ dependances systeme Linux) via le script genere dans
      # la sortie de build du projet E2E. Sans cette etape, chaque smoke se saute (skip propre).
      - name: Installer Chromium (Playwright)
        run: pwsh tests/Piscine.DevHost.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      # Fait tourner UNIQUEMENT les E2E DevHost (le reste de la suite passe deja dans build-test). Les
      # tests resolvent eux-memes le contenu reel via PISCINE_CONTENT (racine du depot) par sous-processus.
      - name: E2E (DevHost, Playwright)
        run: dotnet test tests/Piscine.DevHost.E2E/Piscine.DevHost.E2E.csproj --no-build --verbosity normal

  # Dry-run AppImage Linux (online) : garde de packaging — construit l'AppImage online et verifie
  # qu'elle est bien produite. NE TOURNE QUE si le packaging change (CI-1). L'AppImage OFFLINE
  # (webkit bundle) est ABANDONNEE en v3.1.0 : WebKitGTK release ignore WEBKIT_EXEC_PATH (honore
  # seulement en DEVELOPER_MODE) et cherche ses process auxiliaires a un chemin absolu compile
  # (PKGLIBEXECDIR) -> impossible d'embarquer un webkit fonctionnel sans bind-mount privilegie.
  # L'online s'appuie sur le webkit systeme (libwebkit2gtk-4.1). Cf. adr/2026-06-08-photinox-fork.md.
  appimage-online-dryrun:
    needs: changes
    if: ${{ needs.changes.outputs.packaging == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Construire l'AppImage online (garde de packaging)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick libfuse2 patchelf desktop-file-utils \
            librsvg2-2 librsvg2-common libglib2.0-bin libgdk-pixbuf2.0-bin
          dotnet run --project src/Piscine.Cli -c Release -- package-content content artifacts/content
          appdir="artifacts/appimage-online/AppDir"
          mkdir -p "$appdir/usr/bin/gitshim" "$appdir/usr/share/piscine"
          dotnet publish src/Piscine.Desktop -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin"
          dotnet publish src/Piscine.GitShim  -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin/gitshim"
          dotnet publish src/Piscine.Sandbox  -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin/sandbox"
          test -f "$appdir/usr/bin/sandbox/Piscine.Sandbox"
          cp -r artifacts/content "$appdir/usr/share/piscine/content"
          mkdir -p dist
          bash build/installer/linux/build-appimage.sh online "$appdir" dist/piscine-online.AppImage
          test -s dist/piscine-online.AppImage
          ls -lh dist/piscine-online.AppImage
          echo "ONLINE OK : AppImage online construite (s'appuie sur le webkit systeme au lancement)"

  # Dry-run installeur Windows (S13) : garde de compilation — Inno Setup + ISCC sur un payload stub,
  # les 2 modes (offline/online), assert que les 2 .exe sont produits. NE TOURNE QUE si le packaging
  # change (CI-1). (Le vrai payload + telechargements WebView2 sont exerces par release.yml au tag.)
  windows-installer-dryrun:
    needs: changes
    if: ${{ needs.changes.outputs.packaging == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Installer Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Compiler les installeurs (payload stub)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $p = "payload"
          New-Item -ItemType Directory -Force "$p/desktop/gitshim", "$p/sandbox", "$p/content/modules", "$p/mingit" | Out-Null
          foreach ($f in @("piscine.exe","desktop/Piscine.Desktop.exe","desktop/gitshim/git.exe","sandbox/Piscine.Sandbox.exe","webview2-setup.exe","content/modules/.keep")) {
            "stub" | Set-Content "$p/$f"
          }
          Copy-Item build/launchers/start-piscine.cmd, build/launchers/start-piscine-desktop.cmd $p
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $payloadAbs = (Resolve-Path $p).Path
          & $iscc "/DMODE=offline" "/DAPPVERSION=v0.0.0-dryrun" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          & $iscc "/DMODE=online"  "/DAPPVERSION=v0.0.0-dryrun" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          $exes = Get-ChildItem build\installer\windows\dist\*.exe
          $exes | Select-Object Name, Length
          if ($exes.Count -lt 2) { Write-Error "Attendu 2 installeurs (.exe), trouve $($exes.Count)" }
          Write-Host "OK : 2 installeurs Inno compiles (offline + online)"

# Analyse de sécurité CodeQL (gratuite pour les dépôts publics). Résultats dans l'onglet Security
# → Code scanning. C# en build-mode "none" (analyse sans compilation, rapide) + JS/TS.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # tous les lundis 06:00 UTC

# Concurrence : annule l'analyse précédente si une nouvelle est poussée sur la même ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyser
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

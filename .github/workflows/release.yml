name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  MINGIT_VERSION: 2.47.1
  MINGIT_TAG: v2.47.1.windows.1

jobs:
  # ── Linux : zips self-contained (win+linux, cross-publiés) + AppImage online ────────────────────
  package-linux:
    # ubuntu-24.04 : aligné sur PhotinoX 4.2.0 / webkit2gtk-4.1. L'AppImage online ne bundle pas webkit
    # (s'appuie sur le webkit système au lancement) ; le webkit n'est donc pas requis au build.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Assembler le contenu (sans solution/)
        run: dotnet run --project src/Piscine.Cli --configuration Release -- package-content content artifacts/content

      - name: Zips self-contained (win + linux) + MinGit (win)
        run: |
          set -euo pipefail
          mkdir -p dist artifacts/pkg
          curl -sL "https://github.com/git-for-windows/git/releases/download/${MINGIT_TAG}/MinGit-${MINGIT_VERSION}-64-bit.zip" -o mingit.zip
          for rid in linux-x64 win-x64; do
            out="artifacts/pkg/piscine-$rid"
            dotnet publish src/Piscine.Cli --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out"
            cp -r artifacts/content "$out/content"
            dotnet publish src/Piscine.Desktop --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out/desktop"
            dotnet publish src/Piscine.GitShim --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out/desktop/gitshim"
            # Bac à sable d'exécution recrue (self-contained, modèle gitshim) à la racine du bundle :
            # atteint par la CLI ($out) et par le Desktop ($out/desktop, via remontée du SandboxLocator).
            dotnet publish src/Piscine.Sandbox --configuration Release -r "$rid" --self-contained true -p:PublishSingleFile=false -o "$out/sandbox"
            if [ "$rid" = "win-x64" ]; then
              mkdir -p "$out/mingit"; unzip -q mingit.zip -d "$out/mingit"
              cp build/launchers/start-piscine.cmd "$out/start-piscine.cmd"
              cp build/launchers/start-piscine-desktop.cmd "$out/start-piscine-desktop.cmd"
            else
              cp build/launchers/start-piscine-desktop.sh "$out/start-piscine-desktop.sh"; chmod +x "$out/start-piscine-desktop.sh"
            fi
            ( cd artifacts/pkg && zip -qr "$GITHUB_WORKSPACE/dist/piscine-${{ github.ref_name }}-$rid.zip" "piscine-$rid" )
          done
          ls -lh dist

      # AppImage ONLINE uniquement : s'appuie sur le webkit système (libwebkit2gtk-4.1) du poste.
      # La variante offline (webkit bundlé) est abandonnée en v3.1.0 : WebKitGTK release ignore
      # WEBKIT_EXEC_PATH (honoré seulement en DEVELOPER_MODE) et cherche ses process auxiliaires à un
      # chemin absolu compilé → un AppImage ne peut pas embarquer un webkit fonctionnel sans bind-mount
      # privilégié. Suivi true-offline : voir le backlog. Imagemagick/appimagetool suffisent ici.
      - name: AppImage Linux (online)
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick libfuse2 patchelf desktop-file-utils \
            librsvg2-2 librsvg2-common libglib2.0-bin libgdk-pixbuf2.0-bin
          for mode in online; do
            appdir="artifacts/appimage-$mode/AppDir"
            mkdir -p "$appdir/usr/bin/gitshim" "$appdir/usr/share/piscine"
            dotnet publish src/Piscine.Desktop  --configuration Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin"
            dotnet publish src/Piscine.GitShim   --configuration Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin/gitshim"
            dotnet publish src/Piscine.Sandbox   --configuration Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -o "$appdir/usr/bin/sandbox"
            cp -r artifacts/content "$appdir/usr/share/piscine/content"
            bash build/installer/linux/build-appimage.sh "$mode" "$appdir" \
              "dist/piscine-${{ github.ref_name }}-linux-x86_64-$mode.AppImage"
          done
          ls -lh dist

      - uses: actions/upload-artifact@v7
        with:
          name: dist-linux
          path: dist/*

  # ── Windows : installeurs Inno Setup (offline = Standalone WebView2 / online = bootstrapper) ─────
  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - name: Installer Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Payload + installeurs (offline + online)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet run --project src/Piscine.Cli -c Release -- package-content content artifacts/content
          $p = "payload"
          dotnet publish src/Piscine.Cli      -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o $p
          dotnet publish src/Piscine.Desktop  -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o "$p/desktop"
          dotnet publish src/Piscine.GitShim  -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o "$p/desktop/gitshim"
          dotnet publish src/Piscine.Sandbox  -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o "$p/sandbox"
          Copy-Item -Recurse artifacts/content "$p/content"
          Copy-Item build/launchers/start-piscine.cmd, build/launchers/start-piscine-desktop.cmd $p
          Invoke-WebRequest "https://github.com/git-for-windows/git/releases/download/$env:MINGIT_TAG/MinGit-$env:MINGIT_VERSION-64-bit.zip" -OutFile mingit.zip
          New-Item -ItemType Directory -Force "$p/mingit" | Out-Null
          Expand-Archive mingit.zip -DestinationPath "$p/mingit" -Force
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $payloadAbs = (Resolve-Path $p).Path
          $ver = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          # OFFLINE : runtime WebView2 Standalone Evergreen (full, hors-ligne).
          Invoke-WebRequest "https://go.microsoft.com/fwlink/?linkid=2124701" -OutFile "$p/webview2-setup.exe"
          & $iscc "/DMODE=offline" "/DAPPVERSION=$ver" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          # ONLINE : bootstrapper Evergreen (léger, télécharge).
          Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$p/webview2-setup.exe"
          & $iscc "/DMODE=online" "/DAPPVERSION=$ver" "/DPAYLOAD=$payloadAbs" "build\installer\windows\piscine.iss"
          Copy-Item build\installer\windows\dist\*.exe dist\
          Get-ChildItem dist | Select-Object Name, Length

      - uses: actions/upload-artifact@v7
        with:
          name: dist-windows
          path: dist/*.exe

  # ── Publication : agrège les artefacts et crée la GitHub Release ────────────────────────────────
  release:
    needs: [package-linux, package-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist-all
      - name: Créer la GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lhR dist-all
          gh release create "${{ github.ref_name }}" \
            dist-all/dist-linux/* dist-all/dist-windows/* \
            --repo "${{ github.repository }}" \
            --title "Piscine .NET ${{ github.ref_name }}" \
            --notes "Windows & Linux (macOS abandonné). **Installeurs Windows** \`.exe\` (offline = runtime WebView2 embarqué / online = télécharge). **Linux AppImage** (online : s'appuie sur le webkit système, \`libwebkit2gtk-4.1\`). **Zips** self-contained aussi fournis (CLI \`piscine\` + app de bureau). Voir docs/mise-en-oeuvre.md."

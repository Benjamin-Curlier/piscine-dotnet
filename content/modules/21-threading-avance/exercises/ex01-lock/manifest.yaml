id: ex01-lock
title: "Compteur protégé par lock"
objective: "Incrémenter un compteur partagé N fois depuis plusieurs threads en protégeant l'accès avec lock."
deliverables: [Lock.cs]
starter: [Lock.cs]
grading:
  - type: io
    cases:
      - stdin: "1000\n"
        expect_stdout: "1000\n"
        expect_exit: 0
      - stdin: "50\n"
        expect_stdout: "50\n"
        expect_exit: 0
      - stdin: "1\n"
        expect_stdout: "1\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "var verrou = new object(); int compteur = 0; Parallel.For(0, n, _ => { lock (verrou) { compteur++; } }); puis affiche compteur. N'oublie pas using System.Threading.Tasks;."
  course_ref: "cours.md#lock"
solution: [Lock.cs]

id: ex03-somme-parallele-carres
title: "Somme des carrés en parallèle"
objective: "Sommer les carrés 1..N en parallèle (Parallel.For) avec accumulation atomique (Interlocked), résultat déterministe."
difficulty: difficile
bonus: true
deliverables: [SommeParallele.cs]
starter: [SommeParallele.cs]
grading:
  - type: io
    cases:
      - stdin: "3\n"
        expect_stdout: "14\n"
        expect_exit: 0
      - stdin: "1\n"
        expect_stdout: "1\n"
        expect_exit: 0
      - stdin: "5\n"
        expect_stdout: "55\n"
        expect_exit: 0
      # N plus grand : prouve l'absence de race (résultat stable) et l'usage du long
      - stdin: "1000\n"
        expect_stdout: "333833500\n"
        expect_exit: 0
      - stdin: "10\n"
        expect_stdout: "385\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Parallel.For(1, n + 1, i => Interlocked.Add(ref total, (long)i * i)). La borne haute est exclue (n + 1). total += ... sans Interlocked donnerait un résultat instable (race)."
    - when: compile_error
      message: "`using System.Threading.Tasks;` (Parallel) et `using System.Threading;` (Interlocked)."
  course_ref: "cours.md#parallele-interlocked"
solution: [SommeParallele.cs]

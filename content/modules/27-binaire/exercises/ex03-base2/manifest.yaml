id: ex03-base2
title: "Représentation binaire"
objective: "Convertir un entier en sa représentation binaire avec Convert.ToString(n, 2)."
difficulty: difficile
bonus: true
deliverables: [Base2.cs]
starter: [Base2.cs]
grading:
  - type: io
    cases:
      - stdin: "5\n"
        expect_stdout: "101\n"
        expect_exit: 0
      - stdin: "0\n"
        expect_stdout: "0\n"
        expect_exit: 0
      - stdin: "10\n"
        expect_stdout: "1010\n"
        expect_exit: 0
      # anti-hardcode : 1 => "1" (minimum non nul, pas de zéros en tête)
      - stdin: "1\n"
        expect_stdout: "1\n"
        expect_exit: 0
      # 16 = 2^4 => "10000" (puissance de 2)
      - stdin: "16\n"
        expect_stdout: "10000\n"
        expect_exit: 0
      # 255 = 11111111 (8 bits à 1)
      - stdin: "255\n"
        expect_stdout: "11111111\n"
        expect_exit: 0
      # 42 = 101010 (pattern alternés)
      - stdin: "42\n"
        expect_stdout: "101010\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Ajoute using System; puis affiche Convert.ToString(n, 2) : la base 2 retire déjà les zéros de tête."
  course_ref: "cours.md#base2"
solution: [Base2.cs]

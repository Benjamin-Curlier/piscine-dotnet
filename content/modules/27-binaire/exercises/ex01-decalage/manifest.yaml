id: ex01-decalage
title: "Décalages"
objective: "Utiliser les opérateurs de décalage << et >> et observer leur effet (multiplier/diviser par 2)."
difficulty: moyen
deliverables: [Decalage.cs]
starter: [Decalage.cs]
grading:
  - type: io
    cases:
      - stdin: "1\n4\n"
        expect_stdout: "16\n0\n"
        expect_exit: 0
      - stdin: "8\n1\n"
        expect_stdout: "16\n4\n"
        expect_exit: 0
      - stdin: "5\n2\n"
        expect_stdout: "20\n1\n"
        expect_exit: 0
      # anti-hardcode : n=1, k=0 => 1<<0=1, 1>>0=1 (décalage nul)
      - stdin: "1\n0\n"
        expect_stdout: "1\n1\n"
        expect_exit: 0
      # n=16, k=3 => 16<<3=128, 16>>3=2 (puissance de 2)
      - stdin: "16\n3\n"
        expect_stdout: "128\n2\n"
        expect_exit: 0
      # n=100, k=2 => 100<<2=400, 100>>2=25
      - stdin: "100\n2\n"
        expect_stdout: "400\n25\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Affiche n << k sur la première ligne, puis n >> k sur la seconde."
  course_ref: "cours.md#decalage"
solution: [Decalage.cs]

id: ex02-bfs
title: "BFS — plus court chemin"
objective: "Trouver le nombre minimal de pas entre S et E sur une grille non pondérée via un parcours en largeur."
difficulty: moyen
deliverables: [Bfs.cs]
starter: [Bfs.cs]
grading:
  - type: io
    cases:
      - stdin: "3 3\nS..\n.#.\n..E\n"
        expect_stdout: "4\n"
        expect_exit: 0
      - stdin: "1 3\nS#E\n"
        expect_stdout: "IMPOSSIBLE\n"
        expect_exit: 0
      - stdin: "1 6\nS....E\n"
        expect_stdout: "5\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "BFS : une file, un tableau distance initialisé à -1. Enfile S avec distance 0, et pour chaque case dépile et explore les 4 voisins non-murs jamais visités. Si E reste à -1, affiche IMPOSSIBLE."
  course_ref: "cours.md#bfs"
solution: [Bfs.cs]

id: ex03-astar
title: "A* — chemin de coût minimal"
objective: "Implémenter A* avec heuristique de Manhattan sur une grille pondérée et afficher le coût minimal."
difficulty: difficile
deliverables: [AStar.cs]
starter: [AStar.cs]
grading:
  - type: io
    cases:
      - stdin: "3 3\n111\n191\n111\n0 0\n2 2\n"
        expect_stdout: "4\n"
        expect_exit: 0
      - stdin: "3 3\n1#1\n1#1\n111\n0 0\n0 2\n"
        expect_stdout: "6\n"
        expect_exit: 0
      - stdin: "2 3\n1#1\n1#1\n0 0\n0 2\n"
        expect_stdout: "IMPOSSIBLE\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "A* = Dijkstra guidé par une heuristique. Priorité d'une case = coût réel g depuis le départ + estimation h = distance de Manhattan jusqu'à l'arrivée. Le coût d'entrée dans une case est son chiffre ; le départ ne coûte rien."
  course_ref: "cours.md#astar"
solution: [AStar.cs]

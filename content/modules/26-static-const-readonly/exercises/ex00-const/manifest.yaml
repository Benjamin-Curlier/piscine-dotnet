id: ex00-const
title: "Multiplication par une constante"
objective: "Déclarer une constante de compilation avec const et l'utiliser pour multiplier une entrée."
difficulty: facile
deliverables: [Const.cs]
starter: [Const.cs]
grading:
  - type: io
    cases:
      - stdin: "5\n"
        expect_stdout: "50\n"
        expect_exit: 0
      - stdin: "0\n"
        expect_stdout: "0\n"
        expect_exit: 0
      - stdin: "7\n"
        expect_stdout: "70\n"
        expect_exit: 0
      # anti-hardcode : négatif — prouve que const*n est générique, pas une somme naïve
      - stdin: "-3\n"
        expect_stdout: "-30\n"
        expect_exit: 0
      # grand nombre — vérifie la multiplication correcte par la constante
      - stdin: "100\n"
        expect_stdout: "1000\n"
        expect_exit: 0
      # 1 — vérifie que Facteur=10 et pas 5 ou autre
      - stdin: "1\n"
        expect_stdout: "10\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Déclare `const int Facteur = 10;` en haut du fichier, puis affiche `n * Facteur`."
  course_ref: "cours.md#const"
solution: [Const.cs]

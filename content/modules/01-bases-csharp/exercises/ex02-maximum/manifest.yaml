id: ex02-maximum
title: "Maximum"
objective: "Lire deux entiers sur l'entrée standard et afficher le plus grand."
deliverables: [Maximum.cs]
starter: [Maximum.cs]
grading:
  - type: io
    cases:
      - stdin: "3\n8\n"
        expect_stdout: "8\n"
        expect_exit: 0
      - stdin: "10\n2\n"
        expect_stdout: "10\n"
        expect_exit: 0
      - stdin: "5\n5\n"
        expect_stdout: "5\n"
        expect_exit: 0
      # deux négatifs (le max est le moins négatif)
      - stdin: "-3\n-8\n"
        expect_stdout: "-3\n"
        expect_exit: 0
      - stdin: "-10\n-2\n"
        expect_stdout: "-2\n"
        expect_exit: 0
      # premier > second (anti-hardcode sur l'ordre)
      - stdin: "7\n3\n"
        expect_stdout: "7\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Compare a et b ; affiche le plus grand (a > b ? a : b)."
  course_ref: "cours.md#maximum"
solution: [Maximum.cs]

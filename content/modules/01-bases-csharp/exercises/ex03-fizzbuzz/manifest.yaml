id: ex03-fizzbuzz
title: "FizzBuzz"
objective: "Afficher les entiers de 1 à N en remplaçant les multiples de 3 par Fizz, de 5 par Buzz, des deux par FizzBuzz."
difficulty: difficile
bonus: true
deliverables: [FizzBuzz.cs]
starter: [FizzBuzz.cs]
grading:
  - type: io
    cases:
      - stdin: "5\n"
        expect_stdout: ""
        expect_exit: 0
      - stdin: "15\n"
        expect_stdout: ""
        expect_exit: 0
      - stdin: "1\n"
        expect_stdout: ""
        expect_exit: 0
      # multiple de 3 seulement
      - stdin: "3\n"
        expect_stdout: ""
        expect_exit: 0
      # multiple de 5 et de 3 dans la plage
      - stdin: "16\n"
        expect_stdout: ""
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Teste d'ABORD i % 15 == 0 (les deux), puis i % 3 == 0, puis i % 5 == 0, sinon affiche i. L'ordre des tests est crucial."
  course_ref: "cours.md#fizzbuzz"
solution: [FizzBuzz.cs]

id: ex00-division-securisee
title: "Division sécurisée"
objective: "Gérer une DivideByZeroException avec try/catch."
deliverables: [Division.cs]
starter: [Division.cs]
grading:
  - type: io
    cases:
      - stdin: "10\n2\n"
        expect_stdout: "5\n"
        expect_exit: 0
      - stdin: "7\n0\n"
        expect_stdout: "Erreur: division par zero\n"
        expect_exit: 0
      - stdin: "9\n3\n"
        expect_stdout: "3\n"
        expect_exit: 0
      # dividende négatif (résultat négatif)
      - stdin: "-12\n4\n"
        expect_stdout: "-3\n"
        expect_exit: 0
      # 0 divisé par un nombre (résultat = 0)
      - stdin: "0\n5\n"
        expect_stdout: "0\n"
        expect_exit: 0
      # diviseur -1
      - stdin: "15\n-3\n"
        expect_stdout: "-5\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Mets le calcul a / b dans un try, et attrape catch (DivideByZeroException) pour afficher le message d'erreur."
  course_ref: "cours.md#division"
solution: [Division.cs]

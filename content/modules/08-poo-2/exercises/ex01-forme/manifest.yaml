id: ex01-forme
title: "Aire des formes"
objective: "Définir une interface IForme et l'implémenter dans Carre et Rectangle (polymorphisme)."
deliverables: [Forme.cs]
starter: [Forme.cs]
grading:
  - type: io
    cases:
      - stdin: "4\n3\n5\n"
        expect_stdout: "16\n15\n"
        expect_exit: 0
      - stdin: "2\n10\n1\n"
        expect_stdout: "4\n10\n"
        expect_exit: 0
      - stdin: "5\n5\n5\n"
        expect_stdout: "25\n25\n"
        expect_exit: 0
      # côté=1 largeur=1 hauteur=1 : cas minimal
      - stdin: "1\n1\n1\n"
        expect_stdout: "1\n1\n"
        expect_exit: 0
      # carré grand vs rectangle petit : valeurs très différentes
      - stdin: "10\n2\n3\n"
        expect_stdout: "100\n6\n"
        expect_exit: 0
      # rectangle carré (largeur = hauteur) : carré ≠ rectangle même si Aire identique
      - stdin: "7\n7\n7\n"
        expect_stdout: "49\n49\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "interface IForme { int Aire(); } ; Carre => Cote*Cote, Rectangle => Largeur*Hauteur."
  course_ref: "cours.md#forme"
solution: [Forme.cs]

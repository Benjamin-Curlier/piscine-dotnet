id: ex02-attribut
title: "Un attribut personnalisé"
objective: "Définir un attribut personnalisé, l'appliquer à plusieurs classes et lire, par réflexion, la valeur portée par la classe désignée sur stdin."
deliverables: [Attribut.cs]
starter: [Attribut.cs]
grading:
  - type: io
    cases:
      # le nom lu sur stdin sélectionne la classe dont on lit l'étiquette
      - stdin: "MaClasse\n"
        expect_stdout: "Coucou\n"
        expect_exit: 0
      - stdin: "Produit\n"
        expect_stdout: "Catalogue de produits\n"
        expect_exit: 0
      - stdin: "Client\n"
        expect_stdout: "Fiche client\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "EtiquetteAttribute : Attribute avec un string Texte, appliqué à plusieurs classes avec des textes différents. Lis le nom sur stdin, choisis le type (switch => typeof(...)), puis type.GetCustomAttribute<EtiquetteAttribute>()!.Texte."
  course_ref: "cours.md#attribut"
solution: [Attribut.cs]

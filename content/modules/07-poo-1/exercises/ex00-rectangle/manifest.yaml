id: ex00-rectangle
title: "Rectangle"
objective: "Définir une classe Rectangle avec des propriétés et une méthode Aire()."
deliverables: [Rectangle.cs]
starter: [Rectangle.cs]
grading:
  - type: io
    cases:
      - stdin: "3\n4\n"
        expect_stdout: "12\n"
        expect_exit: 0
      - stdin: "5\n5\n"
        expect_stdout: "25\n"
        expect_exit: 0
      - stdin: "10\n1\n"
        expect_stdout: "10\n"
        expect_exit: 0
      # cas limite : largeur = 1, hauteur = 1
      - stdin: "1\n1\n"
        expect_stdout: "1\n"
        expect_exit: 0
      # grandes valeurs pour détecter un hard-code sur petits entiers
      - stdin: "100\n200\n"
        expect_stdout: "20000\n"
        expect_exit: 0
      # rectangle asymétrique (ordre inversé)
      - stdin: "7\n3\n"
        expect_stdout: "21\n"
        expect_exit: 0
      # cas non-carré avec résultat non trivial
      - stdin: "12\n11\n"
        expect_stdout: "132\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Une classe Rectangle { Largeur; Hauteur; int Aire() => Largeur * Hauteur; }."
  course_ref: "cours.md#rectangle"
solution: [Rectangle.cs]

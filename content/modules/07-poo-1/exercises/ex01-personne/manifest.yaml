id: ex01-personne
title: "Personne"
objective: "Définir une classe Personne avec des propriétés et une méthode de présentation."
deliverables: [Personne.cs]
starter: [Personne.cs]
grading:
  - type: io
    cases:
      - stdin: "Alice\n30\n"
        expect_stdout: "Je m'appelle Alice, j'ai 30 ans.\n"
        expect_exit: 0
      - stdin: "Bob\n25\n"
        expect_stdout: "Je m'appelle Bob, j'ai 25 ans.\n"
        expect_exit: 0
      # nom composé avec espace
      - stdin: "Jean-Pierre\n42\n"
        expect_stdout: "Je m'appelle Jean-Pierre, j'ai 42 ans.\n"
        expect_exit: 0
      # âge = 0 (bébé)
      - stdin: "Bébé\n0\n"
        expect_stdout: "Je m'appelle Bébé, j'ai 0 ans.\n"
        expect_exit: 0
      # grand âge
      - stdin: "Henri\n100\n"
        expect_stdout: "Je m'appelle Henri, j'ai 100 ans.\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Classe Personne { Nom; Age; string SePresenter() => $\"Je m'appelle {Nom}, j'ai {Age} ans.\"; }."
  course_ref: "cours.md#personne"
solution: [Personne.cs]

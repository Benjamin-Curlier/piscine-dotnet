id: ex02-point
title: "Classer un point"
objective: "Classer un Point (record) selon ses coordonnées avec des property patterns."
difficulty: moyen
deliverables: [Point.cs]
starter: [Point.cs]
grading:
  - type: io
    cases:
      - stdin: "0\n0\n"
        expect_stdout: "origine\n"
        expect_exit: 0
      - stdin: "0\n5\n"
        expect_stdout: "axe Y\n"
        expect_exit: 0
      - stdin: "2\n3\n"
        expect_stdout: "quelconque\n"
        expect_exit: 0
      # Axe X (y=0, x≠0) — non couvert par les cas existants
      - stdin: "3\n0\n"
        expect_stdout: "axe X\n"
        expect_exit: 0
      # Coordonnées négatives → quelconque
      - stdin: "-1\n-1\n"
        expect_stdout: "quelconque\n"
        expect_exit: 0
      # Axe Y avec x=0, y négatif
      - stdin: "0\n-7\n"
        expect_stdout: "axe Y\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Property pattern : p switch { { X: 0, Y: 0 } => \"origine\", { X: 0 } => \"axe Y\", { Y: 0 } => \"axe X\", _ => \"quelconque\" }. Le cas le plus précis d'abord."
  course_ref: "cours.md#point"
solution: [Point.cs]

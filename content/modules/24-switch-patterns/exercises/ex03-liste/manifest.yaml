id: ex03-liste
title: "Premier et dernier"
objective: "Analyser un tableau d'entiers avec un list pattern et la tranche .. pour isoler premier et dernier."
difficulty: difficile
bonus: true
deliverables: [Liste.cs]
starter: [Liste.cs]
grading:
  - type: io
    cases:
      - stdin: "5\n"
        expect_stdout: "un seul\n"
        expect_exit: 0
      - stdin: "1 2 3\n"
        expect_stdout: "premier=1 dernier=3\n"
        expect_exit: 0
      - stdin: "10 20\n"
        expect_stdout: "premier=10 dernier=20\n"
        expect_exit: 0
      # 4 éléments : premier et dernier bien isolés par ..
      - stdin: "1 2 3 4\n"
        expect_stdout: "premier=1 dernier=4\n"
        expect_exit: 0
      # Valeurs négatives
      - stdin: "-5 0 7\n"
        expect_stdout: "premier=-5 dernier=7\n"
        expect_exit: 0
      # Un seul élément négatif
      - stdin: "-42\n"
        expect_stdout: "un seul\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "List pattern : t switch { [var x] => \"un seul\", [var f, .., var l] => $\"premier={f} dernier={l}\", _ => \"?\" }. La tranche .. avale les éléments du milieu (et zéro à 2 éléments)."
  course_ref: "cours.md#liste"
solution: [Liste.cs]

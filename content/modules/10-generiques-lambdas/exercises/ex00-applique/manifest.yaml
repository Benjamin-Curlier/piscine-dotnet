id: ex00-applique
title: "Appliquer une fonction"
objective: "Utiliser un Func<int,int> (lambda) pour transformer des valeurs."
deliverables: [Applique.cs]
starter: [Applique.cs]
grading:
  - type: io
    cases:
      - stdin: "3\n2\n3\n4\n"
        expect_stdout: "4\n9\n16\n"
        expect_exit: 0
      - stdin: "1\n5\n"
        expect_stdout: "25\n"
        expect_exit: 0
      - stdin: "2\n0\n10\n"
        expect_stdout: "0\n100\n"
        expect_exit: 0
      # négatif : carré toujours positif
      - stdin: "1\n-7\n"
        expect_stdout: "49\n"
        expect_exit: 0
      # grand nombre : détecte un hardcode ou débordement
      - stdin: "1\n100\n"
        expect_stdout: "10000\n"
        expect_exit: 0
      # valeur 1 (cas identité)
      - stdin: "2\n1\n-1\n"
        expect_stdout: "1\n1\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Déclare Func<int, int> carre = x => x * x; puis affiche carre(n) pour chaque entier lu."
  course_ref: "cours.md#lambdas"
solution: [Applique.cs]

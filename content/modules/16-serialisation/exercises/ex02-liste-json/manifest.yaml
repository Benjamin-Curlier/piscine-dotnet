id: ex02-liste-json
title: "Une liste en tableau JSON"
objective: "Construire une List<string> et la sérialiser en tableau JSON avec JsonSerializer.Serialize."
deliverables: [ListeJson.cs]
starter: [ListeJson.cs]
grading:
  - type: io
    cases:
      - stdin: "3\na\nb\nc\n"
        expect_stdout: "[\"a\",\"b\",\"c\"]\n"
        expect_exit: 0
      - stdin: "1\nx\n"
        expect_stdout: "[\"x\"]\n"
        expect_exit: 0
      - stdin: "2\nhi\nbye\n"
        expect_stdout: "[\"hi\",\"bye\"]\n"
        expect_exit: 0
      # Liste avec 4 éléments
      - stdin: "4\nalpha\nbeta\ngamma\ndelta\n"
        expect_stdout: "[\"alpha\",\"beta\",\"gamma\",\"delta\"]\n"
        expect_exit: 0
      # Chaînes avec espaces
      - stdin: "2\nhello world\nfoo bar\n"
        expect_stdout: "[\"hello world\",\"foo bar\"]\n"
        expect_exit: 0
      # Chiffres comme chaînes (pas d'entiers JSON, vraiment des strings)
      - stdin: "3\n1\n2\n3\n"
        expect_stdout: "[\"1\",\"2\",\"3\"]\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Lis N, remplis une List<string> dans une boucle for, puis JsonSerializer.Serialize(liste). Une liste devient un tableau JSON [\"a\",\"b\"]."
  course_ref: "cours.md#listes"
solution: [ListeJson.cs]

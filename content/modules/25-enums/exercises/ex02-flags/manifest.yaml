id: ex02-flags
title: "Combiner des permissions"
objective: "Combiner plusieurs membres d'un enum [Flags] avec l'opérateur | et afficher la valeur entière obtenue."
difficulty: moyen
deliverables: [Flags.cs]
starter: [Flags.cs]
grading:
  - type: io
    cases:
      - stdin: "2\nLecture\nEcriture\n"
        expect_stdout: "3\n"
        expect_exit: 0
      - stdin: "1\nExecution\n"
        expect_stdout: "4\n"
        expect_exit: 0
      - stdin: "3\nLecture\nEcriture\nExecution\n"
        expect_stdout: "7\n"
        expect_exit: 0
      # anti-hardcode : Lecture+Execution sans Ecriture => 1|4 = 5
      - stdin: "2\nLecture\nExecution\n"
        expect_stdout: "5\n"
        expect_exit: 0
      # Ecriture seule => 2
      - stdin: "1\nEcriture\n"
        expect_stdout: "2\n"
        expect_exit: 0
      # Ecriture+Execution sans Lecture => 2|4 = 6
      - stdin: "2\nEcriture\nExecution\n"
        expect_stdout: "6\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "[Flags] enum Permissions { Lecture = 1, Ecriture = 2, Execution = 4 } ; accumule resultat |= Enum.Parse<Permissions>(nom) ; affiche (int)resultat."
  course_ref: "cours.md#flags"
solution: [Flags.cs]

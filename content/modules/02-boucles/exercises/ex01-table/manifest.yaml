id: ex01-table
title: "Table de multiplication"
objective: "Afficher la table de multiplication d'un entier, de 1 à 10."
deliverables: [Table.cs]
starter: [Table.cs]
grading:
  - type: io
    cases:
      - stdin: "2\n"
        expect_stdout: "1 x 2 = 2\n2 x 2 = 4\n3 x 2 = 6\n4 x 2 = 8\n5 x 2 = 10\n6 x 2 = 12\n7 x 2 = 14\n8 x 2 = 16\n9 x 2 = 18\n10 x 2 = 20\n"
        expect_exit: 0
      - stdin: "5\n"
        expect_stdout: "1 x 5 = 5\n2 x 5 = 10\n3 x 5 = 15\n4 x 5 = 20\n5 x 5 = 25\n6 x 5 = 30\n7 x 5 = 35\n8 x 5 = 40\n9 x 5 = 45\n10 x 5 = 50\n"
        expect_exit: 0
      # table de 1 (borne)
      - stdin: "1\n"
        expect_stdout: "1 x 1 = 1\n2 x 1 = 2\n3 x 1 = 3\n4 x 1 = 4\n5 x 1 = 5\n6 x 1 = 6\n7 x 1 = 7\n8 x 1 = 8\n9 x 1 = 9\n10 x 1 = 10\n"
        expect_exit: 0
      # table de 0 (tous les produits valent 0)
      - stdin: "0\n"
        expect_stdout: "1 x 0 = 0\n2 x 0 = 0\n3 x 0 = 0\n4 x 0 = 0\n5 x 0 = 0\n6 x 0 = 0\n7 x 0 = 0\n8 x 0 = 0\n9 x 0 = 0\n10 x 0 = 0\n"
        expect_exit: 0
      # N plus grand (anti-hardcode)
      - stdin: "9\n"
        expect_stdout: "1 x 9 = 9\n2 x 9 = 18\n3 x 9 = 27\n4 x 9 = 36\n5 x 9 = 45\n6 x 9 = 54\n7 x 9 = 63\n8 x 9 = 72\n9 x 9 = 81\n10 x 9 = 90\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Une boucle for de 1 à 10. Affiche chaque ligne au format exact : i x N = (i * N)."
  course_ref: "cours.md#table"
solution: [Table.cs]

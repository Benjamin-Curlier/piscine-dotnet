id: ex02-recherche-binaire
title: "Recherche binaire"
objective: "Implémenter la recherche binaire à la main sur un tableau trié et retourner l'indice 0-based de la cible, ou -1."
difficulty: moyen
deliverables: [RechercheBinaire.cs]
starter: [RechercheBinaire.cs]
grading:
  - type: io
    cases:
      - stdin: "5\n1 2 3 4 5\n3\n"
        expect_stdout: "2\n"
        expect_exit: 0
      - stdin: "5\n1 2 3 4 5\n6\n"
        expect_stdout: "-1\n"
        expect_exit: 0
      - stdin: "3\n10 20 30\n10\n"
        expect_stdout: "0\n"
        expect_exit: 0
      # cible au premier indice (borne gauche)
      - stdin: "7\n1 3 5 7 9 11 13\n1\n"
        expect_stdout: "0\n"
        expect_exit: 0
      # cible au dernier indice (borne droite)
      - stdin: "7\n1 3 5 7 9 11 13\n13\n"
        expect_stdout: "6\n"
        expect_exit: 0
      # absente, entre deux éléments
      - stdin: "7\n1 3 5 7 9 11 13\n8\n"
        expect_stdout: "-1\n"
        expect_exit: 0
      # absente, en dessous du minimum
      - stdin: "7\n1 3 5 7 9 11 13\n0\n"
        expect_stdout: "-1\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Initialise gauche=0 et droite=n-1. Dans la boucle while (gauche<=droite) : milieu=(gauche+droite)/2 ; si t[milieu]==cible retourne milieu ; si t[milieu]<cible gauche=milieu+1 ; sinon droite=milieu-1. Si non trouvé, affiche -1."
  course_ref: "cours.md#recherche-binaire"
solution: [RechercheBinaire.cs]

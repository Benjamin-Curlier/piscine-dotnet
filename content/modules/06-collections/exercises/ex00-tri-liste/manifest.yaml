id: ex00-tri-liste
title: "Trier une liste"
objective: "Lire des nombres et les afficher triés par ordre croissant, via une List."
deliverables: [TriListe.cs]
starter: [TriListe.cs]
grading:
  - type: io
    cases:
      - stdin: "3 1 2\n"
        expect_stdout: "1 2 3\n"
        expect_exit: 0
      - stdin: "5\n"
        expect_stdout: "5\n"
        expect_exit: 0
      - stdin: "10 -3 7 -3\n"
        expect_stdout: "-3 -3 7 10\n"
        expect_exit: 0
      # déjà trié : ne doit pas mélanger
      - stdin: "1 2 3 4 5\n"
        expect_stdout: "1 2 3 4 5\n"
        expect_exit: 0
      # ordre inversé : doit renverser
      - stdin: "9 7 5 3 1\n"
        expect_stdout: "1 3 5 7 9\n"
        expect_exit: 0
      # toutes valeurs identiques
      - stdin: "4 4 4\n"
        expect_stdout: "4 4 4\n"
        expect_exit: 0
      # un seul élément négatif
      - stdin: "-99\n"
        expect_stdout: "-99\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Remplis une List<int>, appelle .Sort(), puis string.Join(' ', liste)."
  course_ref: "cours.md#tri-liste"
solution: [TriListe.cs]

id: ex00-correspond
title: "Que des chiffres ?"
objective: "Valider chaque ligne avec Regex.IsMatch et le motif ^\\d+$ (oui/non)."
deliverables: [Correspond.cs]
starter: [Correspond.cs]
grading:
  - type: io
    cases:
      - stdin: "3\n123\nabc\n45a\n"
        expect_stdout: "oui\nnon\nnon\n"
        expect_exit: 0
      - stdin: "1\n999\n"
        expect_stdout: "oui\n"
        expect_exit: 0
      - stdin: "2\nhello\n42\n"
        expect_stdout: "non\noui\n"
        expect_exit: 0
      # Cas limite : ligne vide (aucun chiffre → non) + grand entier
      - stdin: "2\n\n1000000\n"
        expect_stdout: "non\noui\n"
        expect_exit: 0
      # Chiffres avec espace → motif ^\\d+$ rejette les espaces
      - stdin: "3\n12 34\n0\n007\n"
        expect_stdout: "non\noui\noui\n"
        expect_exit: 0
      # Entier négatif : le - n'est pas \\d
      - stdin: "2\n-5\n5\n"
        expect_stdout: "non\noui\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Utilise Regex.IsMatch(ligne, @\"^\\d+$\") ? \"oui\" : \"non\". Le ^ et le $ exigent QUE des chiffres."
  course_ref: "cours.md#correspond"
solution: [Correspond.cs]

id: ex02-email
title: "Email valide ?"
objective: "Reconnaître un email simple avec Regex.IsMatch et le motif ^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$."
deliverables: [Email.cs]
starter: [Email.cs]
grading:
  - type: io
    cases:
      - stdin: "3\nuser@mail.com\nbad\na@b.c\n"
        expect_stdout: "valide\ninvalide\nvalide\n"
        expect_exit: 0
      - stdin: "1\nx@y.z\n"
        expect_stdout: "valide\n"
        expect_exit: 0
      - stdin: "2\n@no.com\nok@ok.fr\n"
        expect_stdout: "invalide\nvalide\n"
        expect_exit: 0
      # Double arobase invalide ; email avec sous-domaine valide
      - stdin: "2\nuser@@mail.com\nme@sub.domain.org\n"
        expect_stdout: "invalide\nvalide\n"
        expect_exit: 0
      # Email avec chiffres valide ; pas de point dans le domaine = invalide
      - stdin: "2\nuser123@mail.co\nnodot@nodot\n"
        expect_stdout: "valide\ninvalide\n"
        expect_exit: 0
      # Espace dans l'adresse : invalide ; email long valide
      - stdin: "2\nuser @mail.com\nfirst.last+tag@example.co.uk\n"
        expect_stdout: "invalide\nvalide\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Regex.IsMatch(ligne, @\"^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$\") ? \"valide\" : \"invalide\". [^@\\s]+ = au moins un caractère qui n'est ni @ ni espace."
  course_ref: "cours.md#email"
solution: [Email.cs]

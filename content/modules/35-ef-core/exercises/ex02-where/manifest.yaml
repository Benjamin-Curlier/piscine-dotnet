id: ex02-where
title: "Filtre (Where) + tri"
objective: "Filtrer des entités selon une condition, puis trier le résultat."
difficulty: moyen
deliverables: [Catalogue.cs]
starter: [Catalogue.cs]
grading:
  - type: io
    cases:
      - stdin: "2\n3\nPoire 2\nPomme 1\nBanane 3\n"
        expect_stdout: "Banane 3\nPoire 2\n"
        expect_exit: 0
      - stdin: "5\n3\nKiwi 4\nMangue 6\nFraise 2\n"
        expect_stdout: "Mangue 6\n"
        expect_exit: 0
      # seuil très élevé : aucun produit → sortie vide
      - stdin: "100\n2\nPeche 3\nMelon 7\n"
        expect_stdout: ""
        expect_exit: 0
      # seuil = 0 : tous les produits passent (triés)
      - stdin: "0\n3\nCitron 2\nAnanas 5\nDatette 1\n"
        expect_stdout: "Ananas 5\nCitron 2\nDatette 1\n"
        expect_exit: 0
      # seuil exactement égal au prix d'un seul produit
      - stdin: "4\n3\nRaisin 4\nFigue 2\nMelon 6\n"
        expect_stdout: "Melon 6\nRaisin 4\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Lis le seuil, puis N, puis N 'nom prix'. Garde les produits dont Prix >= seuil : db.Produits.Where(x => x.Prix >= seuil).OrderBy(x => x.Nom)."
  course_ref: "cours.md#requetes"
solution: [Catalogue.cs]

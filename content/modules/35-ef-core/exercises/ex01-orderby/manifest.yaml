id: ex01-orderby
title: "Requête triée (OrderBy)"
objective: "Lire des entités triées par un champ — clé du déterminisme en io."
difficulty: moyen
deliverables: [Catalogue.cs]
starter: [Catalogue.cs]
grading:
  - type: io
    cases:
      - stdin: "3\nPoire 2\nPomme 1\nBanane 3\n"
        expect_stdout: "Banane 3\nPoire 2\nPomme 1\n"
        expect_exit: 0
      - stdin: "2\nZebre 9\nAbeille 4\n"
        expect_stdout: "Abeille 4\nZebre 9\n"
        expect_exit: 0
      # 4 éléments : tri lexicographique vérifié
      - stdin: "4\nMangue 5\nKiwi 3\nAnanas 8\nFigue 1\n"
        expect_stdout: "Ananas 8\nFigue 1\nKiwi 3\nMangue 5\n"
        expect_exit: 0
      # 1 seul élément
      - stdin: "1\nTomate 7\n"
        expect_stdout: "Tomate 7\n"
        expect_exit: 0
feedback:
  hints:
    - when: io_mismatch
      message: "Insère chaque 'nom prix', puis itère db.Produits.OrderBy(x => x.Nom) et affiche 'nom prix'. Sans OrderBy, l'ordre n'est pas garanti."
  course_ref: "cours.md#requetes"
solution: [Catalogue.cs]

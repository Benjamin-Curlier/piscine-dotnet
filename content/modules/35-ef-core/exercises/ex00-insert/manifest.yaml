id: ex00-insert
title: "DbContext, insertion & comptage"
objective: "Créer un DbContext sur SQLite in-memory, insérer des entités et les compter."
difficulty: moyen
deliverables: [Catalogue.cs]
starter: [Catalogue.cs]
grading:
  - type: io
    cases:
      - stdin: "3\nPomme\nPoire\nBanane\n"
        expect_stdout: "3\n"
        expect_exit: 0
      - stdin: "1\nKiwi\n"
        expect_stdout: "1\n"
        expect_exit: 0
      # 0 produit inséré
      - stdin: "0\n"
        expect_stdout: "0\n"
        expect_exit: 0
      # 5 produits
      - stdin: "5\nAnanas\nMelon\nFigue\nDatte\nAvocado\n"
        expect_stdout: "5\n"
        expect_exit: 0
      # 2 produits
      - stdin: "2\nCerise\nMyrtille\n"
        expect_stdout: "2\n"
        expect_exit: 0
  - type: unit
    test_files: [grader/InsertTests.cs]
feedback:
  hints:
    - when: io_mismatch
      message: "Ouvre une SqliteConnection 'DataSource=:memory:' et garde-la ouverte. DbContextOptionsBuilder<T>().UseSqlite(connexion). EnsureCreated(), Add chaque Produit, SaveChanges(), puis affiche Produits.Count()."
    - when: unit_failure
      message: "Il faut un VRAI DbContext : une entité Produit (avec Nom), un Catalogue : DbContext exposant DbSet<Produit> Produits et un constructeur (DbContextOptions<Catalogue>). Le comptage doit venir de la base, pas d'un Console.Write."
  course_ref: "cours.md#dbcontext"
solution: [Catalogue.cs]
